gaussian_splatting:
  # Whether to sort by depth or not (current implementation does it in chunks by sorting the gaussians based on centers). This was needed due to memory
  depth_sort: False
  max_depth_gaussians: 4
  use_color: true

  # At every step the offline training goes through each image one by one
  offline: False                   # Whether we have data and we want to produce an offline gaussian splat
  offline_steps: 100             # interpreted as "number of epochs over all images"
  offline_save_every_epochs: 2    # save every 2 epochs (example)
  
  update_interval: 1.0            # seconds between checking for new images
  initial_training_steps: 100    # your GS budget for initial pass
  incremental_steps: 100          # steps per set of new images
  num_init_gaussians: 2000        # initial number of randomized Gaussians
  initial_log_scale: -4.0         # log scale used to seed initial and spawned Gaussians
  save_every_new_images: 50       # how many new images before saving txt + splat
    # Training hyperparameters (for your optimizer)
  training:
    learning_rates:
      position: 1.0e-2
      scale:    1.0e-2
      rotation: 1.0e-2
      color:    1.0e-2
      opacity:  1.0e-2

    loss_weights:
      l1:   1.0
      ssim: 0.2

  # Budget / pruning
  max_gaussians: 20000           # hard cap, to keep memory bounded

  pruning:
    opacity_threshold: 0.005 #0.01      # drop very transparent gaussians
    view_count_threshold: 1      # drop gaussians never seen / used
    enabled: true
    threshold: 0.02        # in [0,1] after sigmoid
    grad_threshold: 0.0    # optional gradient norm gate for pruning
    interval_steps: 200    # how often to prune (in optimization steps)

  densify:
    enabled: true
    start_step: 100
    interval_steps: 100
    split_fraction: 0.05
    max_splits_per_iter: 2048
    position_jitter: 0.2
    spawn_fraction: 0.02
    spawn_alpha_threshold: 0.05
    target_coverage: 0.6

  saving:
    save_render_interval_steps: 100    # save every N optimization steps
    save_dir: "/home/thanos/Documents/IROS_2026/GaussianSplatting/GaussianSpace/Documents_IROS_2026/GS_test0"
    save_format: "txt"           # "txt" or "npy" depending on your writer

  # Renderer defaults (for both online + offline renderer)
  renderer:
    image_width: 640             # from calibration.width
    image_height: 480            # from calibration.height
    background_color: [0.0, 0.0, 0.0]
    tile_size: 16                # for tiled splatting / culling
